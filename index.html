<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="build" content="20260702-223555">
  <title>Bailey — Engineering Design Standards</title>
  <style>
    :root {
      --red: #E30613;
      --ink: #14171A;
      --steel: #5B6670;
      --hairline: #E3E6EA;
      --panel: #F6F7F9;
      --white: #FFFFFF;
      --sans: Arial, "Helvetica Neue", Helvetica, sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      --bar-h: 60px;
      --nav-w: 320px;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body { font-family: var(--sans); color: var(--ink); background: var(--panel); -webkit-font-smoothing: antialiased; }
    a { color: var(--red); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ---------- app bar ---------- */
    .bar {
      position: fixed; top: 0; left: 0; right: 0; height: var(--bar-h);
      background: var(--ink); color: var(--white);
      display: flex; align-items: center; gap: 14px; padding: 0 20px; z-index: 30;
    }
    .bar::before { content: ""; position: absolute; inset: 0 0 auto 0; height: 5px; background: var(--red); }
    .bar .mark { height: 30px; width: auto; color: var(--red); flex: none; }
    .bar .brand { font-weight: 700; font-size: 17px; }
    .bar .brand .sub { color: #9aa4ad; font-weight: 400; }
    .bar .spacer { flex: 1; }
    .menu-btn { display: none; background: none; border: 1px solid #3A3F44; color: var(--white); width: 38px; height: 34px; border-radius: 4px; cursor: pointer; font-size: 16px; flex: none; }

    /* ---------- nav ---------- */
    .nav {
      position: fixed; top: var(--bar-h); bottom: 0; left: 0; width: var(--nav-w);
      background: var(--white); border-right: 1px solid var(--hairline); overflow-y: auto; padding: 14px 0 40px; z-index: 20;
    }
    .filter-wrap { padding: 4px 16px 10px; }
    .filter { width: 100%; font-family: var(--mono); font-size: 12px; padding: 9px 10px; border: 1px solid var(--hairline); border-radius: 4px; background: var(--panel); color: var(--ink); }
    .filter:focus { outline: none; border-color: var(--red); }
    .nav-group { border-top: 1px solid var(--hairline); }
    .nav-group:first-of-type { border-top: none; }
    .grp-title {
      width: 100%; text-align: left; background: none; border: none; cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      font-weight: 700; font-size: 13px; color: var(--ink); padding: 13px 16px;
    }
    .grp-title:hover { color: var(--red); }
    .grp-title .cnum { font-family: var(--mono); font-size: 12px; color: var(--red); font-weight: 700; flex: none; min-width: 14px; }
    .grp-title .chev { margin-left: auto; transition: transform 0.18s ease; color: var(--steel); font-size: 11px; }
    .nav-group:not(.collapsed) .grp-title .chev { transform: rotate(90deg); }
    .nav-group.collapsed .grp-items { display: none; }
    .grp-items { padding-bottom: 6px; }
    .nav a.item {
      display: flex; gap: 9px; padding: 7px 16px 7px 20px; color: var(--steel); font-size: 13.5px; line-height: 1.35; border-left: 3px solid transparent;
    }
    .nav a.item .num { font-family: var(--mono); font-size: 11px; color: #aeb6bd; flex: none; }
    .nav a.item:hover { background: var(--panel); text-decoration: none; color: var(--ink); }
    .nav a.item.active { color: var(--ink); font-weight: 700; border-left-color: var(--red); background: var(--panel); }
    .nav a.item.active .num { color: var(--red); }

    /* ---------- content ---------- */
    .content { margin-left: var(--nav-w); padding: calc(var(--bar-h) + 40px) 7vw 96px; max-width: 940px; }
    .backdrop { display: none; }

    .crumb { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--steel); margin: 0 0 10px; }
    .crumb .tick { color: var(--red); }
    article h1 { font-size: clamp(1.9rem, 4.5vw, 2.7rem); font-weight: 700; letter-spacing: -0.01em; line-height: 1.05; margin: 2px 0 8px; }
    article h1 .cnum { color: var(--red); font-family: var(--mono); font-size: 0.7em; margin-right: 10px; }
    article h2 { font-size: 1.3rem; font-weight: 700; margin: 2.2rem 0 0.5rem; }
    article p, article li { font-size: 1.02rem; line-height: 1.62; color: #2b3138; }
    article ul { padding-left: 1.15rem; }
    article li { margin: 0.28rem 0; }
    .lead { font-size: 1.14rem; color: var(--steel); line-height: 1.55; }
    article code { font-family: var(--mono); font-size: 0.85em; background: var(--white); border: 1px solid var(--hairline); border-radius: 3px; padding: 1px 6px; }
    blockquote { margin: 1.2rem 0; padding: 12px 16px; background: var(--white); border-left: 3px solid var(--red); color: var(--steel); font-size: 0.98rem; }
    blockquote.open::before { content: "OPEN "; font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; color: var(--red); font-weight: 700; }
    .ok { margin: 12px 0 4px; padding: 9px 13px; background: #EAF6EC; border-left: 3px solid #1A7F37; color: #14712E; font-weight: 700; font-size: 0.96rem; border-radius: 0 3px 3px 0; }
    .step { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--red); font-weight: 700; margin-top: 1.8rem; }

    table { border-collapse: collapse; width: 100%; margin: 1.1rem 0; font-size: 0.95rem; }
    thead th { background: var(--red); color: #fff; text-align: left; padding: 9px 12px; font-weight: 700; }
    td { border: 1px solid var(--hairline); padding: 9px 12px; vertical-align: top; }
    tbody tr:nth-child(even) td { background: var(--white); }
    td code { background: var(--panel); }

    .refs { font-family: var(--mono); font-size: 12px; color: var(--steel); margin-top: 1rem; }
    .refs span { display: inline-block; border: 1px solid var(--hairline); background: var(--white); padding: 3px 8px; margin: 3px 4px 0 0; }

    .pager { display: flex; justify-content: space-between; gap: 16px; margin-top: 54px; border-top: 1px solid var(--hairline); padding-top: 20px; }
    .pager a { flex: 1; padding: 13px 16px; border: 1px solid var(--hairline); background: var(--white); border-radius: 5px; color: var(--ink); }
    .pager a:hover { border-color: var(--red); text-decoration: none; }
    .pager .dir { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--steel); display: block; margin-bottom: 4px; }
    .pager a.next { text-align: right; }
    .pager a.disabled { visibility: hidden; }

    @media (max-width: 900px) {
      .menu-btn { display: block; }
      .nav { transform: translateX(-100%); transition: transform 0.22s ease; box-shadow: 0 0 40px rgba(0,0,0,0.18); }
      body.nav-open .nav { transform: translateX(0); }
      body.nav-open .backdrop { display: block; position: fixed; inset: var(--bar-h) 0 0 0; background: rgba(20,23,26,0.4); z-index: 15; }
      .content { margin-left: 0; padding: calc(var(--bar-h) + 26px) 22px 80px; }
    }
    @media (prefers-reduced-motion: reduce) { .nav { transition: none; } }
  </style>
</head>

  <script>
    /* ============================================================
       Bailey Engineering Design Standards — content model.
       Built from CLAUDE.md (Naveen + Eric working sessions).
       Working draft, co-authored one chapter at a time; cross-links
       use href="#/<id>" so the whole handbook stays interlinked.
       ============================================================ */
    var GROUPS = [
      { title: "Start Here", items: [
        { id: "about", n: "", title: "About This Standard", body:
          "<p class='lead'>The Bailey Engineering Design Standards replace tribal knowledge with one enforced standard for mechanical parts, assemblies, and drawings — so rework isn't caught late at assembly.</p>" +
          "<h2>The problem we're solving</h2><p>Too much rework, caught too late. The fix: map <strong>As-Is → To-Be</strong>, bridge in phases, and run the process on a standard rather than any one engineer's memory.</p>" +
          "<h2>How this document works</h2><ul>" +
          "<li>One <strong>living document</strong>, co-authored a chapter at a time by engineering (Tony &amp; Keegan) — not handed down.</li>" +
          "<li>When a chapter changes, cross-references propagate so there are <strong>no conflicts or ambiguities</strong>.</li>" +
          "<li>Guiding sequence: <strong>Standard → train → enforce</strong>. See <a href='#/enforcement'>Principles &amp; Enforcement</a>.</li>" +
          "</ul><blockquote>Working draft. Chapter numbering follows the agreed 8-chapter outline; confirm/renumber before deep drafting.</blockquote>" },
        { id: "how-to-use", n: "", title: "How to Use", body:
          "<h2>Navigation</h2><p>Chapters are on the left. Open a chapter with its arrow (they toggle independently). Every cross-reference is clickable, like a wiki, and Prev/Next walks the whole standard in order.</p>" +
          "<h2>Requirement language</h2><ul><li><strong>SHALL / MUST</strong> — mandatory; a deviation needs a logged waiver.</li><li><strong>SHOULD</strong> — strongly recommended.</li><li><strong>MAY</strong> — optional.</li></ul>" +
          "<p>Machine-checkable rules are validated automatically at release; judgment rules require <a href='#/attestation'>engineer attestation</a>.</p>" },
        { id: "roadmap", n: "", title: "Rollout Roadmap", body:
          "<p class='lead'>As-Is → To-Be, bridged in phases. The #1 risk is scope creep, so cheap wins are decoupled from the app work.</p>" +
          "<table><thead><tr><th>Phase</th><th>What</th></tr></thead><tbody>" +
          "<tr><td><code>4.1</code></td><td><strong>Quick-win SOPs now (no software):</strong> mandatory <a href='#/interference'>interference check</a> before release · FEA report before Stage 1→2 · <a href='#/holdpoints'>hold-point sign-off</a> · <a href='#/whole-print'>whole-print review</a>. Run hard 3–4 months.</td></tr>" +
          "<tr><td><code>4.2</code></td><td><strong>Bailey Standard + native audit:</strong> write this document; audit native SolidWorks/PDM capability before custom code. <a href='#/gdt-table'>GD&amp;T</a> lives here.</td></tr>" +
          "<tr><td><code>4.3</code></td><td><strong>One-file proof of concept:</strong> SolidWorks API — read metadata → browser → edit → write back → pass/fail. Cap: one file, one write-back.</td></tr>" +
          "<tr><td><code>4.4</code></td><td><strong>Engineering Audit app</strong> (NetSuite-native). See <a href='#/audit-trail'>Release gate &amp; audit</a>.</td></tr>" +
          "<tr><td><code>4.5</code></td><td><strong>Hanomi / successor</strong> — drawing generation, last, on a clean base.</td></tr>" +
          "</tbody></table><p>Parallel track: parametric <strong>Stage-1 load-cascade</strong> automation — separate, must not block Stages 2–3.</p>" },
      ]},
      { title: "Get Set Up", items: [
        { id: "github-basics", n: "", title: "GitHub Basics", body:
          "<p class='lead'>GitHub is just a website that stores software so anyone can download it. Getting started is a few clicks — no experience needed. Do each step; you'll see <strong>Success!</strong> when it worked.</p>" +
          "<div class='step'>Step 1 — Create a free account</div>" +
          "<ol><li>Go to <code>github.com</code>.</li><li>Click <strong>Sign up</strong> and follow the prompts.</li><li>Verify your email.</li></ol>" +
          "<div class='ok'>Success! You can sign in at github.com.</div>" +
          "<div class='step'>Step 2 — Open the SolidPilot page</div>" +
          "<ol><li>Go to <code>github.com/eyfel/mcp-server-solidworks</code>.</li><li>This is <strong>SolidPilot</strong> — the tool that lets Claude work inside SolidWorks.</li></ol>" +
          "<div class='ok'>Success! You see the SolidPilot page with a README below it.</div>" +
          "<div class='step'>Step 3 — Star it (so it's easy to find again)</div>" +
          "<ol><li>Click the <strong>Star</strong> button near the top-right.</li></ol>" +
          "<div class='ok'>Success! The button now reads &ldquo;Starred.&rdquo; That's the GitHub basics done.</div>" },
        { id: "install-solidpilot", n: "", title: "Set Up SolidPilot", body:
          "<p class='lead'>This puts SolidPilot on your machine so Claude can talk to SolidWorks. You do it once. If a step won't cooperate, stop and tell Naveen — this is new software and a little fiddly.</p>" +
          "<h2>Check these first</h2><ul>" +
          "<li>A <strong>Windows</strong> PC</li><li><strong>SolidWorks 2026</strong>, licensed and opening normally</li>" +
          "<li><strong>Claude Desktop</strong> installed</li><li>About 30 minutes</li></ul>" +
          "<blockquote class='open'>Not on SolidWorks 2026? Pause and check with Naveen before going further.</blockquote>" +
          "<div class='step'>Step 1 — Get the SolidPilot files</div>" +
          "<ol><li>On the SolidPilot page, click the green <strong>Code</strong> button.</li><li>Choose <strong>Download ZIP</strong>.</li><li>Unzip it somewhere easy, like your Documents folder.</li></ol>" +
          "<div class='ok'>Success! You have a SolidPilot folder with files inside.</div>" +
          "<div class='step'>Step 2 — Install what it needs</div>" +
          "<ol><li>Open the <strong>README</strong> on the SolidPilot page and find <em>Requirements</em>.</li><li>Install <strong>.NET Framework 4.8</strong> and <strong>Python 3</strong> using the links there.</li></ol>" +
          "<div class='ok'>Success! The README's install steps finish without errors.</div>" +
          "<div class='step'>Step 3 — Start SolidPilot</div>" +
          "<ol><li>Follow the README to start the server. It runs quietly in the background (at <code>localhost:5000</code>).</li></ol>" +
          "<div class='ok'>Success! The window says the server is running / listening.</div>" +
          "<div class='step'>Step 4 — Connect it to Claude</div>" +
          "<ol><li>Add the small settings block from the README into Claude Desktop's config file.</li><li>Restart Claude Desktop.</li></ol>" +
          "<div class='ok'>Success! In Claude Desktop, the SolidWorks tools now show up.</div>" +
          "<p style='color:var(--steel)'>Exact commands live in the SolidPilot README — follow those for your machine.</p>" },
        { id: "first-test", n: "", title: "Your First Test", body:
          "<p class='lead'>A safe, read-only test — nothing in your model gets changed.</p>" +
          "<div class='step'>Test 1 — Say hello</div>" +
          "<ol><li>Open any part or assembly in <strong>SolidWorks</strong>.</li><li>In <strong>Claude Desktop</strong>, type: <em>&ldquo;Are you connected to SolidWorks? Tell me the name of the open document.&rdquo;</em></li></ol>" +
          "<div class='ok'>Success! Claude replies with your file's name. You're connected.</div>" +
          "<div class='step'>Test 2 — Run a check</div>" +
          "<ol><li>Type: <em>&ldquo;Run interference detection and list any clashes.&rdquo;</em> (This only looks — it changes nothing.)</li></ol>" +
          "<div class='ok'>Success! Claude returns a result. You just ran your first check through Claude.</div>" +
          "<blockquote>Stuck on any step? Note where you stopped and Naveen will help. Once this works, we'll add the everyday workflows.</blockquote>" },
      ]},
      { n: 1, title: "Scope & Fundamentals", items: [
        { id: "scope-covers", n: "1.1", title: "What This Covers", body:
          "<h2>In scope</h2><p>Mechanical <strong>parts, assemblies, and drawings</strong>.</p><h2>Out of scope</h2><p>Electrical and software — covered elsewhere.</p>" +
          "<h2>Who enforces</h2><p>Engineering owns the standard. Compliance is confirmed at the <a href='#/release-gate'>release gate</a> and recorded in the audit trail. Everyone co-authors; nobody hands it down.</p>" },
        { id: "design-stages", n: "1.2", title: "Where It Applies — Design Stages", body:
          "<table><thead><tr><th>Stage</th><th>What happens</th><th>Part #s</th></tr></thead><tbody>" +
          "<tr><td><strong>0 — Concept</strong></td><td>Fit-form-function; rough \"Lego-block\" massing — how big does it need to be.</td><td>None (a few legacy)</td></tr>" +
          "<tr><td><strong>1 — Calculations</strong></td><td>Stress, strain, loads vs <a href='#/service-factor'>service factor</a>. Load cascade platform → base. FEA to fine-tune.</td><td>None</td></tr>" +
          "<tr><td><strong>Gate 1→2</strong></td><td>Assigning the part number <em>is</em> the gate.</td><td>Assigned</td></tr>" +
          "<tr><td><strong>2 — Drawings</strong></td><td>Detailed <a href='#/drawing-carry'>drawings</a> with every mfg dimension; vendors in metadata → NetSuite via CAD link; design review; release.</td><td>Yes</td></tr>" +
          "</tbody></table><p>Beyond Stage 2: manuals, schematics, electrical.</p>" },
        { id: "enforcement", n: "1.3", title: "Principles & Enforcement", body:
          "<h2>Recurring principles</h2><ul>" +
          "<li><strong>Native-first</strong> — map what SolidWorks/PDM already do before building anything custom.</li>" +
          "<li><strong>Standard → train → enforce</strong>, in that order.</li>" +
          "<li><strong>Scope discipline</strong> — decouple cheap wins from the app.</li>" +
          "<li><strong>Compliance is non-blocking but permanently logged</strong> — see <a href='#/validator'>the validator</a>.</li>" +
          "<li><strong>HARDEN</strong> — make each function survive without one person.</li></ul>" },
      ]},
      { n: 2, title: "Drawings & Documentation", items: [
        { id: "drawing-carry", n: "2.1", title: "What Every Drawing Must Carry", body:
          "<p>Every released drawing SHALL carry:</p><ul>" +
          "<li>Title block + revision</li><li>Material (from the <a href='#/materials'>approved list</a>) and surface finish</li>" +
          "<li><strong>All</strong> manufacturing dimensions</li><li><a href='#/gdt-table'>GD&amp;T</a> per feature type</li>" +
          "<li>Critical-dimension (<a href='#/hold-dims'>HOLD</a>) call-outs</li><li>Vendor / part number</li></ul>" },
        { id: "drawing-format", n: "2.2", title: "Format & Layout", body:
          "<p>Consistent title block, revision block, and standard notes across all prints. Vendors set on the drawing and in SolidWorks metadata flow to NetSuite via the CAD link.</p>" },
        { id: "whole-print", n: "2.3", title: "The Missing-Dimension Checklist", body:
          "<h2>Whole-print review</h2><p>Manual dimensioning makes it easy to miss a hole on a complex part. A <strong>whole-print review SHALL</strong> be completed before release — a systematic pass, not an ad-hoc glance. One of the phase <code>4.1</code> quick wins.</p>" },
        { id: "dim-conflict", n: "2.4", title: "Design vs Manufacturing Dimensioning", body:
          "<p>Design and manufacturing dimension differently and it causes conflict:</p><ul>" +
          "<li><strong>Center-relative</strong> (design) vs <strong>ordinate-from-corner</strong> (manufacturing).</li>" +
          "<li><strong>Round</strong> vs <strong>rectangular</strong> zero-position.</li></ul>" +
          "<p>Target state: design → mfg dimensioning <strong>converts automatically</strong>, from one standardized basis.</p>" },
      ]},
      { n: 3, title: "GD&T", items: [
        { id: "gdt-why", n: "3.1", title: "Why GD&T", body:
          "<p>Geometric Dimensioning &amp; Tolerancing locks a part's <strong>size and its position/shape</strong> together — referenced to <strong>datums</strong> — instead of size alone.</p>" +
          "<p>In SolidWorks: <code>Insert → Geometric Tolerance</code> + datum references. SolidWorks <em>displays</em> it; it can't author it for you. The cost is <strong>time + discipline</strong>, not software.</p>" +
          "<p class='refs'><span>ASME Y14.5 (US)</span><span>ISO 1101</span></p>" },
        { id: "gdt-table", n: "3.2", title: "Decision Table by Feature", body:
          "<p class='lead'>Pick the control from the feature's <strong>function</strong>, not its shape. Symbols follow <code>ASME Y14.5</code>; establish datums per <a href='#/gdt-datums'>&sect;3.3</a>.</p>" +

          "<h2>Location &mdash; features of size</h2>" +
          "<table><thead><tr><th>Feature</th><th>Control</th><th>Datums</th><th>When / rule</th></tr></thead><tbody>" +
          "<tr><td>Bolt / clearance-hole pattern</td><td>&#9014; Position <code>&#9410;</code></td><td>A｜B｜C</td><td>Locating &amp; clearance holes. MMC adds bonus tolerance as holes depart from max material &mdash; eases assembly; size it with the <a href='#/interference'>clearance budget</a>.</td></tr>" +
          "<tr><td>Slot / elongated hole</td><td>&#9014; Position</td><td>A｜B｜C</td><td>Width is the feature of size; use to allow float on one axis.</td></tr>" +
          "<tr><td>Locating pin / boss / shaft</td><td>&#9014; Position <code>&#9410;</code></td><td>A｜B｜C</td><td>Mating locators; MMC where it enters a clearance hole.</td></tr>" +
          "<tr><td>Machined pocket / counterbore</td><td>&#9014; Position</td><td>A｜B｜C</td><td>Use Profile instead when the whole pocket form matters.</td></tr>" +
          "</tbody></table>" +

          "<h2>Orientation &mdash; relative to a datum</h2>" +
          "<table><thead><tr><th>Feature</th><th>Control</th><th>Datums</th><th>When / rule</th></tr></thead><tbody>" +
          "<tr><td>Seating shoulder / face &perp; to bore</td><td>&#8869; Perpendicularity</td><td>A</td><td>Bearing shoulders, seating faces.</td></tr>" +
          "<tr><td>Bore / pin axis &perp; to mounting face</td><td>&#8869; Perpendicularity</td><td>A</td><td>Pin bores in plates &amp; weldments.</td></tr>" +
          "<tr><td>Shim / stacked face parallel to base</td><td>&#8741; Parallelism</td><td>A</td><td>Plates, shims, mounting pads.</td></tr>" +
          "<tr><td>Non-90&deg; face / gusset</td><td>&#8736; Angularity</td><td>A (｜B)</td><td>Angled brackets; dimension the basic angle.</td></tr>" +
          "</tbody></table>" +

          "<h2>Form &mdash; no datum</h2>" +
          "<table><thead><tr><th>Feature</th><th>Control</th><th>Datums</th><th>When / rule</th></tr></thead><tbody>" +
          "<tr><td>Bolted / gasket mating face</td><td>&#9189; Flatness</td><td>&mdash;</td><td>Sealing &amp; bolted joints; controls the seating plane.</td></tr>" +
          "<tr><td>Long machined edge / rail</td><td>&#9188; Straightness</td><td>&mdash;</td><td>Straightedges, guide rails.</td></tr>" +
          "<tr><td>Precision pin / bushing OD</td><td>&#9005; Cylindricity</td><td>&mdash;</td><td>Bushings, precision pins (add runout if rotating).</td></tr>" +
          "<tr><td>Bearing bore roundness</td><td>&#9675; Circularity</td><td>&mdash;</td><td>Usually paired with runout on rotating bores.</td></tr>" +
          "</tbody></table>" +

          "<h2>Profile &mdash; size + form + orientation + location in one</h2>" +
          "<table><thead><tr><th>Feature</th><th>Control</th><th>Datums</th><th>When / rule</th></tr></thead><tbody>" +
          "<tr><td>Contoured / complex mating surface</td><td>&#9043; Profile of a surface</td><td>A｜B｜C</td><td>Weldment interfaces, contact faces. Datum-referenced = also locates it.</td></tr>" +
          "<tr><td>Form-only surface</td><td>&#9043; Profile of a surface</td><td>&mdash;</td><td>Controls shape without locating.</td></tr>" +
          "<tr><td>Edge / 2-D curve</td><td>&#9042; Profile of a line</td><td>A｜B</td><td>Sheet-metal edges, trimmed curves.</td></tr>" +
          "<tr><td>Built-up weldment envelope</td><td>&#9043; Profile of a surface</td><td>A｜B｜C</td><td>Hold the finished weldment to a basic-dimension envelope.</td></tr>" +
          "</tbody></table>" +

          "<h2>Runout &mdash; rotating features, about a datum axis</h2>" +
          "<table><thead><tr><th>Feature</th><th>Control</th><th>Datums</th><th>When / rule</th></tr></thead><tbody>" +
          "<tr><td>Sheave / pulley OD &amp; face</td><td>&#8599; Circular runout</td><td>A-B (journal axis)</td><td>Controls wobble / eccentricity per revolution.</td></tr>" +
          "<tr><td>Drum / long rotating shaft</td><td>&#9008; Total runout</td><td>A-B</td><td>Full-length control of the rotating surface.</td></tr>" +
          "<tr><td>Bearing journal</td><td>&#8599; Circular runout</td><td>A-B</td><td>Reference the two supporting journals as a common datum axis.</td></tr>" +
          "</tbody></table>" +

          "<h2>Material-condition modifiers</h2><ul>" +
          "<li>Default is <strong>RFS</strong> (regardless of feature size).</li>" +
          "<li><code>&#9410;</code> <strong>MMC</strong> on clearance holes / pins &mdash; bonus tolerance as the feature departs from max material; the cheapest way to guarantee assembly. Ties to <a href='#/interference'>&sect;7.1</a>.</li>" +
          "<li><code>&#9409;</code> <strong>LMC</strong> where minimum wall thickness or edge distance governs.</li></ul>" +

          "<h2>Tolerance band &harr; service factor</h2>" +
          "<p>Set the position / profile bands from the tolerance stack-up budget so the worst-case stack still holds the <a href='#/service-factor'>&ge; 2.75 service factor</a>. Tighter than functionally needed only adds cost &mdash; see <a href='#/gdt-datums'>&sect;3.3</a>.</p>" +

          "<h2>Do not use (ASME Y14.5-2018)</h2>" +
          "<p>Concentricity (&#9678;) and Symmetry (&#9007;) were removed in Y14.5-2018. Replace with <strong>Position</strong>, <strong>Runout</strong>, or <strong>Profile</strong>.</p>" +

          "<blockquote>First full draft of the Bailey GD&amp;T decision table &mdash; closes open action #4. Review with Tony &amp; Keegan, then train and enforce.</blockquote>" },
        { id: "gdt-datums", n: "3.3", title: "Datums & Tolerance Stack-Up", body:
          "<h2>Establishing datums</h2>" +
          "<p>Datums come from the part's <strong>functional and mating references</strong> &mdash; not convenience. Build a datum reference frame that constrains all six degrees of freedom:</p>" +
          "<table><thead><tr><th>Datum</th><th>Typical feature</th><th>Constrains</th></tr></thead><tbody>" +
          "<tr><td>Primary (A)</td><td>Largest mounting / seating face</td><td>3 DOF (1 translation, 2 rotations)</td></tr>" +
          "<tr><td>Secondary (B)</td><td>A locating edge or bore</td><td>2 DOF</td></tr>" +
          "<tr><td>Tertiary (C)</td><td>A stop edge or second hole</td><td>1 DOF</td></tr>" +
          "</tbody></table>" +
          "<p>Rotating parts: use the two support <strong>journals as a common datum axis (A-B)</strong> for <a href='#/gdt-table'>runout</a>.</p>" +
          "<h2>Tolerance stack-up &harr; service factor</h2>" +
          "<p>Budget the position / profile bands so the <strong>worst-case stack</strong> still preserves the governing <a href='#/service-factor'>service factor (&ge; 2.75)</a>. Convert design intent to <a href='#/std-tol'>standard tolerances</a>, and call out <a href='#/hold-dims'>HOLD</a> dimensions where the stack is critical.</p>" +
          "<p>Hanomi can auto-generate GD&amp;T later from a clean 3D model &mdash; but only once this standard exists.</p>" },
      ]},
      { n: 4, title: "Materials & Fasteners", items: [
        { id: "materials", n: "4.1", title: "Approved Materials", body:
          "<p>All designs draw from <strong>one standardized material list</strong>. Substitutions require review.</p>" +
          "<table><thead><tr><th>Family</th><th>Grades</th></tr></thead><tbody>" +
          "<tr><td>Structural steel</td><td><code>Gr.50</code> · <code>Gr.80</code> · <code>Gr.100</code></td></tr>" +
          "<tr><td>Aluminum</td><td>Approved grades (to be listed)</td></tr>" +
          "</tbody></table>" },
        { id: "service-factor", n: "4.2", title: "Service Factor → Material", body:
          "<p>Design factor <strong>≥ 2.75</strong> for a given grade. When capacity is short, climb the <strong>material ladder</strong> before adding thickness:</p>" +
          "<p><code>Gr.50 → Gr.80 → Gr.100 → thicken</code></p>" +
          "<p>Loads cascade <strong>platform → base</strong> and are recomputed at each level (today by hand; the parallel track automates this as a linked load cascade).</p>" },
        { id: "fasteners", n: "4.3", title: "Fasteners", body:
          "<p>Critical fasteners SHALL be specified on the drawing with <strong>grade, locking method, and torque</strong>.</p>" },
      ]},
      { n: 5, title: "Tolerances & Fits", items: [
        { id: "std-tol", n: "5.1", title: "Standard Tolerances", body:
          "<p>Default hole/shaft tolerance bands live in the title block; only deviations are called out on the feature. Keeps prints clean and consistent.</p>" },
        { id: "hold-dims", n: "5.2", title: "Critical \"HOLD\" Dimensions", body:
          "<p>The engineer marks critical dimensions <strong>HOLD</strong> and signs off. Fabrication <strong>cannot proceed</strong> on a HOLD dimension until it is checked to tolerance — replacing \"it's the print, I'm good\" with a signature. See <a href='#/holdpoints'>Hold-Point Sign-Off</a>.</p>" },
        { id: "fits", n: "5.3", title: "Interference vs Clearance", body:
          "<p>Define interference vs clearance intent per fit; it feeds the assembly-level <a href='#/interference'>interference check</a> and its clearance tolerance.</p>" },
      ]},
      { n: 6, title: "Manufacturing & Fabrication", items: [
        { id: "capabilities", n: "6.1", title: "Assumed Capabilities", body:
          "<p>The standard assumes these processes are available: <strong>press brake, plasma, welding</strong>, and <strong>outsourced machining</strong>. Design to what the shop can actually make.</p>" },
        { id: "dfm", n: "6.2", title: "DFM Rules", body:
          "<p>Design-for-manufacturing rules SHALL be respected, including:</p><ul><li>Minimum bend radius</li><li>Minimum wall thickness</li><li>Edge treatment</li></ul>" },
        { id: "holdpoints", n: "6.3", title: "Hold-Point Sign-Off", body:
          "<p>A hold point is a signed checkpoint: fabrication pauses on <a href='#/hold-dims'>HOLD dimensions</a> until verified to tolerance. A phase <code>4.1</code> quick win — no software required, just discipline and a signature.</p>" },
      ]},
      { n: 7, title: "Assembly & Fit", items: [
        { id: "interference", n: "7.1", title: "Interference Checking", body:
          "<p>Native in SolidWorks: <code>Tools → Interference Detection</code>. Set a <strong>clearance tolerance</strong> (e.g. flag anything closer than <code>1.5\"</code>); it returns interfering pairs + gap and can exclude components you don't care about.</p>" +
          "<p>UI and API give the <strong>same answer</strong> on a complete model — geometry is geometry. The API's advantage is <strong>enforcement, not accuracy</strong>: run it automatically, gate publish, or batch nightly.</p>" +
          "<p>Decision: start with a <strong>mandatory UI check + engineer sign-off</strong> (phase <code>4.1</code>); add API gating later.</p>" +
          "<blockquote class='open'>On failure — block publish, or allow proceed + log? Leaning proceed-with-log, matching the <a href='#/validator'>compliance model</a>.</blockquote>" },
        { id: "hierarchy", n: "7.2", title: "Sub-Assembly Hierarchy & Part Numbering", body:
          "<p>Sub-assembly hierarchy maps to part numbering. Assigning the part number is the <a href='#/design-stages'>Stage 1→2 gate</a>.</p>" },
        { id: "bom", n: "7.3", title: "Where-Used / BOM", body:
          "<p>Parent assembly = BOM / where-used, already in NetSuite (with vendor/MPN synced). This is the \"easy half\" the <a href='#/audit-trail'>Engineering Audit</a> reads without a SolidWorks seat.</p>" },
      ]},
      { n: 8, title: "Compliance & Sign-Off", items: [
        { id: "validator", n: "8.1", title: "The Automated Validator", body:
          "<p>An automated validator checks machine-checkable rules and computes a result — <strong>Meets / Does Not Meet</strong>.</p><ul>" +
          "<li><strong>Non-blocking:</strong> publishing a non-compliant part is allowed, but a <strong>permanent log</strong> is attached.</li>" +
          "<li>The record is authoritative and <strong>not engineer-editable</strong>.</li>" +
          "<li>On SolidWorks Standard, true immutability isn't guaranteed → approximate with a <strong>hash + append-only NetSuite record</strong> locked to a system role, re-stamped each run (<strong>tamper-evident, not tamper-proof</strong>).</li></ul>" +
          "<blockquote class='open'>Accept tamper-evident on Standard, or buy PDM Pro for true immutability + auto-trigger + a hard release gate.</blockquote>" },
        { id: "attestation", n: "8.2", title: "Engineer Attestation", body:
          "<p>Rules that need judgment (not machine-checkable) are covered by <strong>engineer attestation</strong> — a recorded sign-off that the non-automatable requirements are met.</p>" },
        { id: "audit-trail", n: "8.3", title: "Release Gate & Audit Trail", body:
          "<p>At release, a PDM-Pro gate stamps <strong>Meets / Does Not Meet</strong> with full revision control and audit trail. The <strong>Engineering Audit</strong> app (NetSuite-native) surfaces parent assembly, vendor, last-touched-by, and compliance to purchasing, production, and Naveen — no SolidWorks seat required.</p>" +
          "<blockquote>SolidWorks/PDM stays the system of record; NetSuite is store + display. SolidWorks pushes at publish; NetSuite reads.</blockquote>" },
      ]},
      { n: 9, title: "Log", items: [
        { id: "change-log", n: "9.1", title: "Change Log", body:
          "<p class='lead'>Running log of changes and decisions on this standard.</p>" +
          "<table><thead><tr><th>Date</th><th>Who</th><th>Entry</th></tr></thead><tbody>" +
          "<tr><td><code>2026-07-02</code></td><td>Naveen</td><td>Added the <strong>Log</strong> chapter.</td></tr>" +
          "<tr><td><code>2026-07-02</code></td><td>Claude (draft)</td><td>Drafted the full <a href='#/gdt-table'>GD&amp;T decision table</a> (&sect;3.2) and expanded <a href='#/gdt-datums'>datums &amp; stack-up</a> (&sect;3.3). Closes open action #4, pending Tony/Keegan review.</td></tr>" +
          "<tr><td><code>2026-07-02</code></td><td>Naveen</td><td>Added a beginner-friendly <a href='#/github-basics'>Get Set Up</a> section — GitHub basics, SolidPilot install, and a first test — with a Success! checkpoint after each step. Everyday workflows to follow.</td></tr>" +
          "</tbody></table>" },
      ]},
    ];

    /* ---------- flatten + index ---------- */
    var FLAT = [], GROUP_OF = {};
    GROUPS.forEach(function (g, gi) { g.items.forEach(function (it) { GROUP_OF[it.id] = gi; FLAT.push(it); }); });
    var INDEX = {}; FLAT.forEach(function (it, i) { INDEX[it.id] = i; });
    var FIRST = FLAT[0].id;

    var navList = document.getElementById('navList');
    (function buildNav() {
      var html = "";
      GROUPS.forEach(function (g, gi) {
        var cnum = (g.n === undefined || g.n === "") ? "" : "<span class='cnum'>" + g.n + "</span>";
        html += "<div class='nav-group collapsed' data-g='" + gi + "'>" +
                "<button class='grp-title' data-g='" + gi + "'>" + cnum + "<span>" + g.title + "</span><span class='chev'>&#9656;</span></button>" +
                "<div class='grp-items'>";
        g.items.forEach(function (it) {
          html += "<a class='item' href='#/" + it.id + "' data-id='" + it.id + "' data-title='" + (it.n + " " + it.title).toLowerCase() + "'>" +
                  "<span class='num'>" + (it.n || "•") + "</span><span>" + it.title + "</span></a>";
        });
        html += "</div></div>";
      });
      navList.innerHTML = html;
    })();

    var article = document.getElementById('article');
    function currentId() {
      var h = location.hash.replace(/^#\/?/, '').trim();
      return INDEX.hasOwnProperty(h) ? h : FIRST;
    }
    function openGroup(gi, exclusive) {
      Array.prototype.forEach.call(navList.querySelectorAll('.nav-group'), function (el) {
        var idx = +el.getAttribute('data-g');
        if (idx === gi) el.classList.remove('collapsed');
        else if (exclusive) el.classList.add('collapsed');
      });
    }
    function pagerLink(cls, dir, it) {
      if (!it) return "<a class='" + cls + " disabled'></a>";
      var label = (it.n ? it.n + " " : "") + it.title;
      return "<a class='" + cls + "' href='#/" + it.id + "'><span class='dir'>" + dir + "</span>" + label + "</a>";
    }
    function render() {
      var id = currentId(), i = INDEX[id], it = FLAT[i], gi = GROUP_OF[id];
      document.title = "Bailey — " + it.title;
      var cnum = it.n ? "<span class='cnum'>" + it.n + "</span>" : "";
      article.innerHTML =
        "<div class='crumb'><span class='tick'>▸</span> " + GROUPS[gi].title + "</div>" +
        "<h1>" + cnum + it.title + "</h1>" +
        it.body +
        "<div class='pager'>" + pagerLink("prev", "Previous", FLAT[i - 1]) + pagerLink("next", "Next", FLAT[i + 1]) + "</div>";
      Array.prototype.forEach.call(navList.querySelectorAll('a.item'), function (a) {
        a.classList.toggle('active', a.getAttribute('data-id') === id);
      });
      if (!document.body.classList.contains('filtering')) openGroup(gi, false);
      document.body.classList.remove('nav-open');
      window.scrollTo(0, 0);
      var active = navList.querySelector('a.item.active');
      if (active) active.scrollIntoView({ block: 'nearest' });
    }
    window.addEventListener('hashchange', render);
    render();

    /* ---------- collapsible chapters (independent toggles) ---------- */
    Array.prototype.forEach.call(navList.querySelectorAll('.grp-title'), function (btn) {
      btn.addEventListener('click', function () {
        if (document.body.classList.contains('filtering')) return;
        var gi = +btn.getAttribute('data-g');
        navList.querySelector(".nav-group[data-g='" + gi + "']").classList.toggle('collapsed');
      });
    });

    /* ---------- filter (expands all chapters while searching) ---------- */
    document.getElementById('filter').addEventListener('input', function (e) {
      var q = e.target.value.toLowerCase().trim();
      if (q) {
        document.body.classList.add('filtering');
        Array.prototype.forEach.call(navList.querySelectorAll('.nav-group'), function (g) { g.classList.remove('collapsed'); });
      } else {
        document.body.classList.remove('filtering');
        openGroup(GROUP_OF[currentId()], true);
      }
      Array.prototype.forEach.call(navList.querySelectorAll('a.item'), function (a) {
        a.style.display = a.getAttribute('data-title').indexOf(q) > -1 ? '' : 'none';
      });
    });

    /* ---------- mobile drawer ---------- */
    document.getElementById('menuBtn').addEventListener('click', function () { document.body.classList.toggle('nav-open'); });
    document.getElementById('backdrop').addEventListener('click', function () { document.body.classList.remove('nav-open'); });

    /* ---------- auto-update on deploy ---------- */
    (function () {
      var CURRENT = "20260702-223555";
      async function check() {
        try {
          var res = await fetch(location.pathname + "?_=" + Date.now(), { cache: "no-store" });
          if (!res.ok) return;
          var txt = await res.text();
          var m = txt.match(/name="build" content="([^"]+)"/);
          if (m && m[1] !== CURRENT) location.reload();
        } catch (e) {}
      }
      setInterval(check, 20000);
    })();
  </script>
</body>
</html>
